<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolomeet Card – Trentino che parla</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0066CC 0%, #00A3E0 100%);
            color: white;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: rgba(255,255,255,0.95);
            color: #1a1a1a;
            border-radius: 20px;
            padding: 30px 20px;
            max-width: 400px;
            margin: 20px auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #0066CC;
            margin-bottom: 10px;
        }
        .slogan {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-primary {
            background: #0066CC;
            color: white;
        }
        .btn-audio {
            background: #FF6600;
            color: white;
        }
        .btn-sos {
            background: #CC0000;
            color: white;
            animation: pulse 2s infinite;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(204, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0); }
        }
